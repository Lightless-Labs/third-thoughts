name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-14
          - target: x86_64-apple-darwin
            runner: macos-13
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: middens

      - name: Build release binary
        working-directory: middens
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package tarball
        id: package
        working-directory: middens
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          STAGE="middens-${VERSION}-${{ matrix.target }}"
          mkdir -p "dist/${STAGE}"
          cp "target/${{ matrix.target }}/release/middens" "dist/${STAGE}/"
          cp ../LICENSE "dist/${STAGE}/"
          cp README.md "dist/${STAGE}/" 2>/dev/null || true
          tar -C dist -czf "dist/${STAGE}.tar.gz" "${STAGE}"
          ( cd dist && shasum -a 256 "${STAGE}.tar.gz" > "${STAGE}.tar.gz.sha256" )
          echo "tarball=middens/dist/${STAGE}.tar.gz" >> "$GITHUB_OUTPUT"
          echo "checksum=middens/dist/${STAGE}.tar.gz.sha256" >> "$GITHUB_OUTPUT"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: middens-${{ matrix.target }}
          path: |
            ${{ steps.package.outputs.tarball }}
            ${{ steps.package.outputs.checksum }}
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Aggregate checksums
        run: |
          mkdir -p release
          find artifacts -name '*.tar.gz' -exec cp {} release/ \;
          ( cd release && shasum -a 256 *.tar.gz > SHA256SUMS )
          ls -la release

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.tar.gz
            release/SHA256SUMS
          generate_release_notes: true
          fail_on_unmatched_files: true
