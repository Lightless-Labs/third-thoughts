name: HF Corpus Analysis

on:
  workflow_dispatch:
    inputs:
      tier:
        description: "Corpus tier to run when corpus=all"
        type: choice
        default: representative
        options:
          - smoke
          - representative
          - full
      corpus:
        description: "Specific corpus id, or all"
        type: string
        default: all
      registry_repo:
        description: "Optional HF dataset repo containing corpora.json. Empty uses repo-local registry."
        type: string
        default: ""
      registry_revision:
        description: "HF registry dataset revision/branch when registry_repo is set."
        type: string
        default: main
  schedule:
    # Weekly full public-corpus validation. Manual dispatch can run it sooner.
    - cron: "17 3 * * 1"
  pull_request:
    paths:
      - ".github/workflows/hf-corpus-analysis.yml"
      - "docs/corpora/public-hf-analysis-corpora.json"
      - "middens/**"
      - "scripts/fetch_hf_corpus_registry.py"
      - "scripts/hf_corpus_matrix.py"
      - "scripts/materialize_hf_analysis_corpus.py"

permissions:
  contents: read

concurrency:
  group: hf-corpus-analysis-${{ github.ref }}
  cancel-in-progress: true

jobs:
  matrix:
    name: Select corpora
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve registry
        id: registry
        run: |
          mkdir -p .tmp/registry
          REGISTRY="docs/corpora/public-hf-analysis-corpora.json"
          HF_REPO=""
          HF_REVISION="main"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            HF_REPO="${{ inputs.registry_repo }}"
            HF_REVISION="${{ inputs.registry_revision }}"
          elif [ -n "${{ vars.HF_CORPUS_REGISTRY_REPO }}" ]; then
            HF_REPO="${{ vars.HF_CORPUS_REGISTRY_REPO }}"
            HF_REVISION="${{ vars.HF_CORPUS_REGISTRY_REVISION }}"
            if [ -z "$HF_REVISION" ]; then
              HF_REVISION="main"
            fi
          fi
          if [ -n "$HF_REPO" ]; then
            python3 -m pip install --upgrade pip
            python3 -m pip install huggingface_hub
            python3 scripts/fetch_hf_corpus_registry.py \
              --repo-id "$HF_REPO" \
              --revision "$HF_REVISION" \
              --output .tmp/registry/corpora.json
            REGISTRY=".tmp/registry/corpora.json"
          else
            cp "$REGISTRY" .tmp/registry/corpora.json
            REGISTRY=".tmp/registry/corpora.json"
          fi
          echo "registry=$REGISTRY" >> "$GITHUB_OUTPUT"

      - name: Build matrix
        id: matrix
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            TIER="smoke"
            CORPUS="all"
          elif [ "${{ github.event_name }}" = "schedule" ]; then
            TIER="full"
            CORPUS="all"
          else
            TIER="${{ inputs.tier }}"
            CORPUS="${{ inputs.corpus }}"
          fi
          MATRIX="$(python3 scripts/hf_corpus_matrix.py --registry "${{ steps.registry.outputs.registry }}" --tier "$TIER" --corpus "$CORPUS")"
          echo "$MATRIX"
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"

      - name: Upload resolved registry
        uses: actions/upload-artifact@v4
        with:
          name: hf-corpus-registry
          path: .tmp/registry/corpora.json
          if-no-files-found: error

  analyze:
    name: Analyze ${{ matrix.id }}
    needs: matrix
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.matrix.outputs.matrix) }}
    env:
      XDG_DATA_HOME: ${{ github.workspace }}/.tmp/xdg-data/${{ matrix.id }}
      HF_HUB_DISABLE_PROGRESS_BARS: "1"
      MIDDENS_CORPUS_ID: ${{ matrix.id }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: middens

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install workflow Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install huggingface_hub pyarrow

      - name: Download resolved registry
        uses: actions/download-artifact@v4
        with:
          name: hf-corpus-registry
          path: .tmp/registry

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Build middens
        working-directory: middens
        run: cargo build --release --locked

      - name: Materialize pinned HF corpus
        run: |
          python scripts/materialize_hf_analysis_corpus.py \
            --registry ".tmp/registry/corpora.json" \
            --corpus "${{ matrix.id }}" \
            --output ".tmp/hf-corpora/${{ matrix.id }}" \
            --cache-dir ".tmp/hf-cache" \
            --force

      - name: Run full analysis battery (no LLM interpretation)
        run: |
          ./middens/target/release/middens analyze \
            ".tmp/hf-corpora/${{ matrix.id }}" \
            --all \
            --timeout 1800 \
            --force \
            --output ".tmp/middens-results/${{ matrix.id }}"

      - name: Resolve latest analysis directory
        id: latest
        run: |
          ROOT="$XDG_DATA_HOME/com.lightless-labs.third-thoughts/analysis"
          ANALYSIS_DIR="$(find "$ROOT" -maxdepth 1 -type d -name 'run-*' | sort | tail -n 1)"
          if [ -z "$ANALYSIS_DIR" ]; then
            echo "No analysis run found under $ROOT" >&2
            exit 1
          fi
          echo "analysis_dir=$ANALYSIS_DIR" >> "$GITHUB_OUTPUT"
          echo "Analysis dir: $ANALYSIS_DIR"

      - name: Export notebook without interpretation
        run: |
          ./middens/target/release/middens export \
            --analysis-dir "${{ steps.latest.outputs.analysis_dir }}" \
            --no-interpretation \
            --output ".tmp/reports/${{ matrix.id }}.ipynb" \
            --force

      - name: Validate analysis manifest shape
        run: |
          python - <<'PY'
          import json, os, pathlib
          analysis_dir = pathlib.Path(os.environ["ANALYSIS_DIR"])
          manifest = json.loads((analysis_dir / "manifest.json").read_text())
          techniques = manifest.get("techniques", [])
          if len(techniques) != 23:
              raise SystemExit(f"expected 23 techniques, got {len(techniques)}")
          missing = [t.get("name") for t in techniques if "summary" not in t]
          if missing:
              raise SystemExit(f"technique entries missing summary: {missing}")
          print(f"validated {len(techniques)} techniques for {os.environ['MIDDENS_CORPUS_ID']}")
          PY
        env:
          ANALYSIS_DIR: ${{ steps.latest.outputs.analysis_dir }}

      - name: Run HF split stratification smoke
        run: |
          set -euo pipefail
          export XDG_DATA_HOME="${{ github.workspace }}/.tmp/xdg-split/${{ matrix.id }}"
          ./middens/target/release/middens analyze \
            ".tmp/hf-corpora/${{ matrix.id }}" \
            --split \
            --no-python \
            --output ".tmp/middens-split-results/${{ matrix.id }}"
          python - <<'PY'
          import json, os, pathlib
          corpus_id = os.environ["MIDDENS_CORPUS_ID"]
          output = pathlib.Path(".tmp/middens-split-results") / corpus_id
          for name in ["interactive", "subagent", "autonomous"]:
              if not (output / name).is_dir():
                  raise SystemExit(f"missing split output directory: {output / name}")
          root = pathlib.Path(os.environ["XDG_DATA_HOME"]) / "com.lightless-labs.third-thoughts" / "analysis"
          runs = sorted(root.glob("run-*"))
          if not runs:
              raise SystemExit(f"no split analysis run found under {root}")
          split_dir = runs[-1]
          manifest = json.loads((split_dir / "manifest.json").read_text())
          strata = manifest.get("strata") or []
          names = sorted(s.get("name") for s in strata)
          expected = ["autonomous", "interactive", "subagent"]
          if names != expected:
              raise SystemExit(f"expected strata {expected}, got {names}")
          for stratum in strata:
              ref = split_dir / stratum["manifest_ref"]
              if not ref.exists():
                  raise SystemExit(f"missing stratum manifest: {ref}")
              if not isinstance(stratum.get("session_count"), int) or stratum["session_count"] < 0:
                  raise SystemExit(f"invalid session_count in {stratum}")
          print(f"validated split strata for {corpus_id}: {strata}")
          PY

      - name: Upload analysis artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: hf-corpus-analysis-${{ matrix.id }}
          path: |
            .tmp/middens-results/${{ matrix.id }}/
            .tmp/middens-split-results/${{ matrix.id }}/
            .tmp/reports/${{ matrix.id }}.ipynb
            ${{ steps.latest.outputs.analysis_dir }}/manifest.json
          if-no-files-found: warn
